<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Copilot - Dashboard</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <style>
      :root {
        --color-bg-primary: #0f172a;
        --color-bg-secondary: #1e293b;
        --color-bg-tertiary: #334155;
        --color-text-primary: #f1f5f9;
        --color-text-secondary: #cbd5e1;
        --color-text-muted: #94a3b8;
        --color-accent: #38bdf8;
        --color-success: #22c55e;
        --color-warning: #f59e0b;
        --color-danger: #ef4444;
        --color-border: #475569;
        --color-bullish: #22c55e;
        --color-bearish: #ef4444;
        --color-neutral: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        line-height: 1.6;
        padding: 1rem;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      header {
        background: var(--color-bg-secondary);
        padding: 1.5rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        border: 1px solid var(--color-border);
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      h1 {
        color: var(--color-accent);
        font-size: 1.75rem;
        font-weight: 600;
      }

      .controls {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        background: var(--color-bg-tertiary);
        color: var(--color-text-primary);
        border: 1px solid var(--color-border);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.875rem;
        transition: all 0.2s;
      }

      button:hover {
        background: var(--color-accent);
        border-color: var(--color-accent);
      }

      .toggle-container {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }

      .toggle-switch {
        position: relative;
        width: 44px;
        height: 24px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--color-bg-tertiary);
        transition: 0.3s;
        border-radius: 24px;
        border: 1px solid var(--color-border);
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: var(--color-text-secondary);
        transition: 0.3s;
        border-radius: 50%;
      }

      input:checked + .toggle-slider {
        background-color: var(--color-accent);
      }

      input:checked + .toggle-slider:before {
        transform: translateX(20px);
        background-color: white;
      }

      .status-bar {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        padding-top: 1rem;
        border-top: 1px solid var(--color-border);
        font-size: 0.875rem;
      }

      .status-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .status-fresh {
        background: var(--color-success);
      }
      .status-stale {
        background: var(--color-warning);
      }
      .status-error {
        background: var(--color-danger);
      }

      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        overflow-x: auto;
        padding-bottom: 0.5rem;
      }

      .tab {
        background: var(--color-bg-secondary);
        color: var(--color-text-secondary);
        border: 1px solid var(--color-border);
        padding: 0.75rem 1.25rem;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
        font-size: 0.875rem;
      }

      .tab:hover {
        border-color: var(--color-accent);
        color: var(--color-text-primary);
      }

      .tab.active {
        background: var(--color-accent);
        color: white;
        border-color: var(--color-accent);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .watchlist-header {
        background: var(--color-bg-secondary);
        padding: 1.5rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 1px solid var(--color-border);
      }

      .watchlist-header h2 {
        color: var(--color-accent);
        margin-bottom: 0.5rem;
        font-size: 1.5rem;
      }

      .watchlist-meta {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        margin-top: 0.75rem;
      }

      .previous-outcomes {
        background: var(--color-bg-tertiary);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .previous-outcomes h3 {
        font-size: 0.875rem;
        color: var(--color-text-muted);
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }

      .outcomes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 0.75rem;
      }

      .outcome-item {
        background: var(--color-bg-secondary);
        padding: 0.75rem;
        border-radius: 4px;
        border-left: 3px solid;
      }

      .outcome-hit {
        border-left-color: var(--color-success);
      }

      .outcome-miss {
        border-left-color: var(--color-danger);
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1rem;
      }

      .trade-card {
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 1.25rem;
        transition: all 0.2s;
      }

      .trade-card:hover {
        border-color: var(--color-accent);
        transform: translateY(-2px);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
        cursor: pointer;
      }

      .card-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--color-text-primary);
      }

      .card-ticker {
        font-size: 0.875rem;
        color: var(--color-text-muted);
        margin-top: 0.25rem;
      }

      .expand-icon {
        cursor: pointer;
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        transition: transform 0.2s;
        user-select: none;
      }

      .confidence-badge {
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .confidence-high {
        background: rgba(34, 197, 94, 0.2);
        color: var(--color-success);
      }
      .confidence-medium {
        background: rgba(245, 158, 11, 0.2);
        color: var(--color-warning);
      }

      .performance-badge {
        background: rgba(34, 197, 94, 0.15);
        color: var(--color-success);
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-top: 0.5rem;
        display: inline-block;
      }

      .card-summary {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1rem;
        font-size: 0.875rem;
      }

      .card-details {
        display: none;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--color-border);
      }

      .detail-section {
        margin-bottom: 1rem;
      }

      .detail-section:last-child {
        margin-bottom: 0;
      }

      .detail-section h4 {
        font-size: 0.75rem;
        color: var(--color-text-muted);
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .detail-section p {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        line-height: 1.5;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .info-label {
        color: var(--color-text-secondary);
      }

      .info-value {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      .card-metrics {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        padding-top: 1rem;
        border-top: 1px solid var(--color-border);
        font-size: 0.875rem;
      }

      .metric {
        display: flex;
        flex-direction: column;
      }

      .metric-label {
        color: var(--color-text-muted);
        font-size: 0.75rem;
        margin-bottom: 0.25rem;
      }

      .metric-value {
        color: var(--color-text-primary);
        font-weight: 600;
      }

      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      .tag {
        background: var(--color-bg-tertiary);
        color: var(--color-text-secondary);
        padding: 0.25rem 0.625rem;
        border-radius: 4px;
        font-size: 0.75rem;
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--color-danger);
        color: var(--color-danger);
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: var(--color-text-secondary);
      }

      .loading::after {
        content: "...";
        animation: dots 1.5s infinite;
      }

      @keyframes dots {
        0%,
        20% {
          content: ".";
        }
        40% {
          content: "..";
        }
        60%,
        100% {
          content: "...";
        }
      }

      .market-regime {
        padding: 1.5rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        border: 2px solid;
      }

      .regime-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .regime-header h2 {
        margin: 0;
        font-size: 1.5rem;
      }

      .regime-status {
        font-size: 1.5rem;
        font-weight: 700;
      }

      .regime-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }

      .regime-item {
        background: var(--color-bg-secondary);
        padding: 1rem;
        border-radius: 6px;
        border-left: 3px solid;
      }

      .regime-label {
        font-size: 0.75rem;
        color: var(--color-text-muted);
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .regime-value {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--color-text-primary);
      }

      .sectors-section {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--color-border);
      }

      .sectors-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
        margin-top: 0.75rem;
      }

      .sector-box {
        background: var(--color-bg-secondary);
        padding: 0.75rem;
        border-radius: 6px;
      }

      .sector-box h4 {
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
      }

      .sector-list {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }

      .strategy-adjustments {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--color-bg-secondary);
        border-radius: 6px;
        border: 1px solid var(--color-border);
      }

      .strategy-adjustments h3 {
        font-size: 0.875rem;
        color: var(--color-text-muted);
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }

      .adjustment-item {
        margin-bottom: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--color-border);
      }

      .adjustment-item:last-child {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
      }

      .adjustment-strategy {
        font-weight: 600;
        color: var(--color-accent);
        font-size: 0.875rem;
        margin-bottom: 0.25rem;
      }

      .adjustment-text {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        line-height: 1.5;
      }

      @media (max-width: 768px) {
        body {
          padding: 0.5rem;
        }

        h1 {
          font-size: 1.5rem;
        }

        .cards-grid {
          grid-template-columns: 1fr;
        }

        .tabs {
          gap: 0.25rem;
        }

        .tab {
          padding: 0.5rem 1rem;
          font-size: 0.8125rem;
        }

        .regime-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-top">
          <h1>📊 Trading Copilot</h1>
          <div class="controls">
            <button onclick="refreshData()">🔄 Refresh</button>
            <div class="toggle-container">
              <span>Auto-refresh (5min)</span>
              <label class="toggle-switch">
                <input
                  type="checkbox"
                  id="autoRefreshToggle"
                  onchange="toggleAutoRefresh()"
                />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="status-bar">
          <div class="status-item">
            <span class="status-indicator" id="dataStatus"></span>
            <span id="dataStatusText">Loading...</span>
          </div>
          <div class="status-item">
            <span>💰 Capital: $<span id="currentCapital">1000</span></span>
          </div>
          <div class="status-item">
            <span>📅 Last Update: <span id="lastUpdate">-</span></span>
          </div>
        </div>
      </header>

      <div id="marketRegimeSection"></div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('pre-earnings')">
          Pre-Earnings
        </div>
        <div class="tab" onclick="switchTab('post-crash')">Post-Crash</div>
        <div class="tab" onclick="switchTab('volatility')">Volatility</div>
        <div class="tab" onclick="switchTab('crypto')">Crypto</div>
        <div class="tab" onclick="switchTab('pair-trades')">Pair Trades</div>
        <div class="tab" onclick="switchTab('macro-events')">Macro Events</div>
        <div class="tab" onclick="switchTab('journal')">Trade Journal</div>
      </div>

      <div id="pre-earnings" class="tab-content active"></div>
      <div id="post-crash" class="tab-content"></div>
      <div id="volatility" class="tab-content"></div>
      <div id="crypto" class="tab-content"></div>
      <div id="pair-trades" class="tab-content"></div>
      <div id="macro-events" class="tab-content"></div>
      <div id="journal" class="tab-content"></div>
    </div>

    <script>
      const CONFIG = {
        githubUser: "sedhommarco",
        repo: "trading-copilot",
        branch: "main",
        autoRefreshInterval: 5 * 60 * 1000,
        staleThresholdDays: 10,
      };

      let autoRefreshTimer = null;
      let currentData = {};

      function getDataUrl(path) {
        if (window.location.protocol === "file:") {
          return `data/${path}`;
        }
        return `https://raw.githubusercontent.com/${CONFIG.githubUser}/${CONFIG.repo}/${CONFIG.branch}/data/${path}`;
      }

      async function fetchJSON(url) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        } catch (error) {
          console.error(`Failed to fetch ${url}:`, error);
          throw error;
        }
      }

      // Normalize all trade objects to use standard property names
      function normalizeTradeData(trade, strategy) {
        const normalized = { ...trade };

        // Standardize ticker field
        if (!normalized.ticker) {
          normalized.ticker =
            trade.symbol || trade.instrument || trade.long_ticker || "N/A";
        }

        // Standardize company name
        if (!normalized.company_name) {
          normalized.company_name = trade.company || trade.name || "";
        }

        // Standardize conviction to confidence mapping
        if (trade.conviction && !normalized.confidence) {
          const convictionMap = { high: 80, moderate: 60, low: 40 };
          normalized.confidence = convictionMap[trade.conviction] || 50;
        }

        return normalized;
      }

      async function loadAllData() {
        try {
          const [
            manifest,
            preEarnings,
            postCrash,
            volatility,
            crypto,
            pairTrades,
            macroEvents,
            marketRegime,
            tradeJournal,
          ] = await Promise.all([
            fetchJSON(getDataUrl("meta/manifest.json")),
            fetchJSON(getDataUrl("watchlists/pre-earnings.json")),
            fetchJSON(getDataUrl("watchlists/post-crash.json")),
            fetchJSON(getDataUrl("watchlists/volatility.json")),
            fetchJSON(getDataUrl("watchlists/crypto.json")),
            fetchJSON(getDataUrl("watchlists/pair-trades.json")),
            fetchJSON(getDataUrl("watchlists/macro-events.json")),
            fetchJSON(getDataUrl("context/market-regime.json")),
            fetchJSON(getDataUrl("journal/trade-history.json")),
          ]);

          currentData = {
            manifest,
            "pre-earnings": preEarnings,
            "post-crash": postCrash,
            volatility: volatility,
            crypto: crypto,
            "pair-trades": pairTrades,
            "macro-events": macroEvents,
            "market-regime": marketRegime,
            journal: tradeJournal,
          };

          updateUI();
          checkDataFreshness(manifest);
        } catch (error) {
          showError("Failed to load data. Check console for details.");
          console.error(error);
        }
      }

      function checkDataFreshness(manifest) {
        const lastUpdate = new Date(manifest.last_global_update);
        const now = new Date();
        const daysSinceUpdate = (now - lastUpdate) / (1000 * 60 * 60 * 24);

        const statusIndicator = document.getElementById("dataStatus");
        const statusText = document.getElementById("dataStatusText");

        if (daysSinceUpdate > manifest.stale_threshold_days) {
          statusIndicator.className = "status-indicator status-stale";
          statusText.textContent = `⚠️ Data is ${Math.floor(daysSinceUpdate)} days old`;
        } else {
          statusIndicator.className = "status-indicator status-fresh";
          statusText.textContent = "✓ Data is fresh";
        }

        document.getElementById("lastUpdate").textContent =
          lastUpdate.toLocaleDateString();
      }

      function updateUI() {
        if (currentData.journal) {
          document.getElementById("currentCapital").textContent =
            currentData.journal.capital_current.toFixed(2);
        }

        renderMarketRegime();

        const watchlists = [
          "pre-earnings",
          "post-crash",
          "volatility",
          "crypto",
          "pair-trades",
          "macro-events",
        ];
        watchlists.forEach((name) => {
          if (currentData[name]) {
            renderWatchlist(name, currentData[name]);
          }
        });

        if (currentData.journal) {
          renderTradeJournal(currentData.journal);
        }
      }

      function renderMarketRegime() {
        const regime = currentData["market-regime"];
        if (!regime) return;

        const currentRegime = regime.current_regime || "N/A";
        const vix = regime.vix || "N/A";
        const trend = regime.trend || "N/A";
        const sentiment = regime.sentiment || "N/A";
        const notes = regime.notes || "";
        const sectorLeaders = regime.sector_leaders || [];
        const sectorLaggards = regime.sector_laggards || [];
        const nextCatalyst = regime.next_major_catalyst || "N/A";
        const fedPolicy = regime.fed_policy || "N/A";
        const strategyAdj = regime.strategy_adjustments || {};

        // Determine regime color
        let regimeColor, regimeBg;
        if (currentRegime.toLowerCase().includes("bull")) {
          regimeColor = "#22c55e";
          regimeBg = "rgba(34, 197, 94, 0.1)";
        } else if (currentRegime.toLowerCase().includes("bear")) {
          regimeColor = "#ef4444";
          regimeBg = "rgba(239, 68, 68, 0.1)";
        } else {
          regimeColor = "#f59e0b";
          regimeBg = "rgba(245, 158, 11, 0.1)";
        }

        let sectorsHtml = "";
        if (sectorLeaders.length > 0 || sectorLaggards.length > 0) {
          sectorsHtml = `
            <div class="sectors-section">
              <div class="sectors-grid">
                ${
                  sectorLeaders.length > 0
                    ? `
                <div class="sector-box" style="border-left: 3px solid var(--color-success);">
                  <h4 style="color: var(--color-success);">📈 Sector Leaders</h4>
                  <div class="sector-list">${sectorLeaders.join(" • ")}</div>
                </div>
                `
                    : ""
                }
                ${
                  sectorLaggards.length > 0
                    ? `
                <div class="sector-box" style="border-left: 3px solid var(--color-danger);">
                  <h4 style="color: var(--color-danger);">📉 Sector Laggards</h4>
                  <div class="sector-list">${sectorLaggards.join(" • ")}</div>
                </div>
                `
                    : ""
                }
              </div>
            </div>
          `;
        }

        let adjustmentsHtml = "";
        if (Object.keys(strategyAdj).length > 0) {
          const adjustmentItems = Object.entries(strategyAdj)
            .map(([key, value]) => {
              const strategyName = key
                .replace(/_/g, " ")
                .replace(/\b\w/g, (l) => l.toUpperCase());
              return `
              <div class="adjustment-item">
                <div class="adjustment-strategy">${strategyName}</div>
                <div class="adjustment-text">${value}</div>
              </div>
            `;
            })
            .join("");

          adjustmentsHtml = `
            <div class="strategy-adjustments">
              <h3>⚙️ Strategy Adjustments</h3>
              ${adjustmentItems}
            </div>
          `;
        }

        const html = `
          <div class="market-regime" style="background: ${regimeBg}; border-color: ${regimeColor};">
            <div class="regime-header">
              <h2 style="color: ${regimeColor};">🌍 Market Regime</h2>
              <div class="regime-status" style="color: ${regimeColor};">
                ${currentRegime.toUpperCase()}
              </div>
            </div>

            <div class="regime-grid">
              <div class="regime-item" style="border-left-color: ${regimeColor};">
                <div class="regime-label">VIX Level</div>
                <div class="regime-value">${vix}</div>
              </div>
              <div class="regime-item" style="border-left-color: ${regimeColor};">
                <div class="regime-label">Trend</div>
                <div class="regime-value">${trend}</div>
              </div>
              <div class="regime-item" style="border-left-color: ${regimeColor};">
                <div class="regime-label">Sentiment</div>
                <div class="regime-value">${sentiment}</div>
              </div>
              <div class="regime-item" style="border-left-color: ${regimeColor};">
                <div class="regime-label">Fed Policy</div>
                <div class="regime-value">${fedPolicy}</div>
              </div>
              <div class="regime-item" style="border-left-color: ${regimeColor};">
                <div class="regime-label">Next Catalyst</div>
                <div class="regime-value" style="font-size: 0.9rem;">${nextCatalyst}</div>
              </div>
            </div>

            ${sectorsHtml}

            ${adjustmentsHtml}

            ${
              notes
                ? `
            <p style="margin-top: 1rem; color: var(--color-text-secondary); font-size: 0.875rem;">
              ${notes}
            </p>
            `
                : ""
            }
          </div>
        `;
        document.getElementById("marketRegimeSection").innerHTML = html;
      }

      function toggleCardExpansion(cardId) {
        const detailsDiv = document.getElementById(cardId);
        const icon = document.getElementById(`${cardId}-icon`);

        if (
          detailsDiv.style.display === "none" ||
          detailsDiv.style.display === ""
        ) {
          detailsDiv.style.display = "block";
          icon.textContent = "▲";
        } else {
          detailsDiv.style.display = "none";
          icon.textContent = "▼";
        }
      }

      function renderPreviousOutcomes(previousOutcomes) {
        if (!previousOutcomes || previousOutcomes.length === 0) return "";

        const outcomesHtml = previousOutcomes
          .map((outcome) => {
            const ticker = outcome.ticker || "N/A";
            const predicted =
              outcome.predicted_direction || outcome.predicted || "N/A";
            const actual = outcome.actual_outcome || outcome.actual || "N/A";
            const hitTarget =
              outcome.hit_target !== undefined ? outcome.hit_target : null;
            const accuracy = outcome.accuracy || "";

            const outcomeClass =
              hitTarget === true || accuracy.toLowerCase().includes("hit")
                ? "outcome-hit"
                : "outcome-miss";

            return `
            <div class="outcome-item ${outcomeClass}">
              <div style="font-weight: 600; margin-bottom: 0.25rem;">${ticker}</div>
              <div style="font-size: 0.8125rem; color: var(--color-text-muted);">
                Predicted: ${predicted}<br>
                Actual: ${actual}
                ${accuracy ? `<br><strong style="color: var(--color-text-primary);">${accuracy}</strong>` : ""}
              </div>
            </div>
          `;
          })
          .join("");

        return `
          <div class="previous-outcomes">
            <h3>📊 Previous Week Outcomes</h3>
            <div class="outcomes-grid">
              ${outcomesHtml}
            </div>
          </div>
        `;
      }

      function renderWatchlist(name, data) {
        const container = document.getElementById(name);
        const trades =
          data.opportunities || data.events || data.candidates || [];
        const previousOutcomes = data.previous_week_outcomes || [];

        const strategyNames = {
          pre_earnings_momentum: "Pre-Earnings Momentum",
          post_crash_rebound: "Post-Crash Rebound",
          pair_trades: "Pair Trading",
          macro_events: "Macro Event Plays",
          volatility_plays: "Volatility Plays",
          crypto_opportunities: "Crypto Opportunities",
        };

        const strategyCode =
          data.strategy || data.strategy_name || data.strategyName || "";
        const strategyName =
          strategyNames[strategyCode] || strategyCode || "Trading Strategy";
        const description = data.description || `Strategy: ${strategyCode}`;
        const weekStart = data.week_start || data.weekStart || "N/A";
        const weekEnd = data.week_end || data.weekEnd || "N/A";
        const riskPerTrade = data.risk_per_trade || data.riskPerTrade || 0.02;

        const header = `
          <div class="watchlist-header">
            <h2>${strategyName}</h2>
            <p style="color: var(--color-text-secondary);">${description}</p>
            <div class="watchlist-meta">
              <span>📅 Week: ${weekStart} to ${weekEnd}</span>
              <span>🎯 Trades: ${trades.length}</span>
              <span>📊 Capital per trade: $${(1000 * riskPerTrade).toFixed(2)}</span>
            </div>
          </div>
          ${renderPreviousOutcomes(previousOutcomes)}
        `;

        const cards = trades
          .map((trade) => {
            const normalizedTrade = normalizeTradeData(trade, strategyCode);

            if (normalizedTrade.long_ticker && normalizedTrade.short_ticker) {
              return renderPairTradeCard(normalizedTrade);
            } else if (normalizedTrade.event_name) {
              return renderMacroEventCard(normalizedTrade);
            } else {
              return renderTradeCard(normalizedTrade);
            }
          })
          .join("");

        container.innerHTML = header + `<div class="cards-grid">${cards}</div>`;
      }

      function renderTradeCard(trade) {
        const cardId = `card-${Math.random().toString(36).substr(2, 9)}`;
        const ticker = trade.ticker || "N/A";
        const company = trade.company_name || "";
        const confidence = trade.confidence || 50;
        const direction = trade.direction || "LONG";
        const lastWeekPerf = trade.last_week_performance || null;

        let entry = trade.current_price || 0;
        if (trade.entry_zone) {
          const zoneParts = String(trade.entry_zone).split("-");
          if (zoneParts.length === 2) {
            entry = (parseFloat(zoneParts[0]) + parseFloat(zoneParts[1])) / 2;
          } else {
            entry = parseFloat(trade.entry_zone) || entry;
          }
        }

        const stopLoss = trade.stop_loss || 0;
        const target = trade.take_profit || 0;

        let riskRewardRatio = "N/A";
        if (entry > 0 && stopLoss > 0 && target > 0) {
          const risk = Math.abs(entry - stopLoss);
          const reward = Math.abs(target - entry);
          riskRewardRatio =
            risk > 0 ? `1:${(reward / risk).toFixed(2)}` : "N/A";
        }

        const timeframe = trade.expected_holding_days
          ? `${trade.expected_holding_days}d`
          : "N/A";
        const earningsDate = trade.earnings_date || null;
        const positionSize = trade.position_size_usd
          ? trade.position_size_usd.toFixed(2)
          : "N/A";
        const confidenceClass =
          confidence >= 75 ? "confidence-high" : "confidence-medium";

        return `
          <div class="trade-card">
            <div class="card-header" onclick="toggleCardExpansion('${cardId}')">
              <div>
                <div class="card-title">${ticker}</div>
                <div class="card-ticker">${company}</div>
                ${lastWeekPerf ? `<div class="performance-badge">Last Week: ${lastWeekPerf}</div>` : ""}
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <div class="confidence-badge ${confidenceClass}">${confidence}%</div>
                <span class="expand-icon" id="${cardId}-icon">▼</span>
              </div>
            </div>

            <div class="card-summary">
              <div class="info-row">
                <span class="info-label">Direction</span>
                <span class="info-value" style="color: ${direction === "LONG" ? "var(--color-success)" : "var(--color-danger)"}">
                  ${direction}
                </span>
              </div>
              ${
                earningsDate
                  ? `
              <div class="info-row">
                <span class="info-label">Earnings</span>
                <span class="info-value">${earningsDate}</span>
              </div>
              `
                  : ""
              }
              <div class="info-row">
                <span class="info-label">Position Size</span>
                <span class="info-value">$${positionSize}</span>
              </div>
            </div>

            <div class="card-metrics">
              <div class="metric">
                <div class="metric-label">Entry</div>
                <div class="metric-value">$${entry > 0 ? entry.toFixed(2) : "N/A"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Target</div>
                <div class="metric-value" style="color: var(--color-success)">$${target > 0 ? target.toFixed(2) : "N/A"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Stop Loss</div>
                <div class="metric-value" style="color: var(--color-danger)">$${stopLoss > 0 ? stopLoss.toFixed(2) : "N/A"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Risk:Reward</div>
                <div class="metric-value">${riskRewardRatio}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Timeframe</div>
                <div class="metric-value">${timeframe}</div>
              </div>
            </div>

            <div class="card-details" id="${cardId}">
              ${
                trade.rationale
                  ? `
              <div class="detail-section">
                <h4>Full Rationale</h4>
                <p>${trade.rationale}</p>
              </div>
              `
                  : ""
              }

              ${
                trade.trade_setup
                  ? `
              <div class="detail-section">
                <h4>Trade Setup</h4>
                <p>${trade.trade_setup}</p>
              </div>
              `
                  : ""
              }

              ${
                trade.entry_trigger
                  ? `
              <div class="detail-section">
                <h4>Entry Trigger</h4>
                <p>${trade.entry_trigger}</p>
              </div>
              `
                  : ""
              }

              ${
                trade.crash_date
                  ? `
              <div class="detail-section">
                <h4>Crash Details</h4>
                <p>Date: ${trade.crash_date}<br>Drop: ${trade.drop_percent}%</p>
              </div>
              `
                  : ""
              }
            </div>
          </div>
        `;
      }

      function renderPairTradeCard(trade) {
        const cardId = `card-${Math.random().toString(36).substr(2, 9)}`;
        const longTicker = trade.long_ticker || "N/A";
        const shortTicker = trade.short_ticker || "N/A";
        const longEntry = trade.long_entry || 0;
        const shortEntry = trade.short_entry || 0;
        const spreadTarget = trade.target_spread || "N/A";
        const allocationPerLeg =
          trade.position_size_usd_each || trade.position_size_usd || 0;
        const timeframe = trade.expected_holding_days
          ? `${trade.expected_holding_days}d`
          : "N/A";
        const confidence = trade.confidence || 50;
        const confidenceClass =
          confidence >= 75 ? "confidence-high" : "confidence-medium";

        return `
          <div class="trade-card">
            <div class="card-header" onclick="toggleCardExpansion('${cardId}')">
              <div>
                <div class="card-title">${longTicker} / ${shortTicker}</div>
                <div class="card-ticker">Pair Trade</div>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <div class="confidence-badge ${confidenceClass}">${confidence}%</div>
                <span class="expand-icon" id="${cardId}-icon">▼</span>
              </div>
            </div>

            <div class="card-summary">
              <div class="info-row">
                <span class="info-label">Long</span>
                <span class="info-value" style="color: var(--color-success)">${longTicker} @ $${longEntry > 0 ? longEntry.toFixed(2) : "N/A"}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Short</span>
                <span class="info-value" style="color: var(--color-danger)">${shortTicker} @ $${shortEntry > 0 ? shortEntry.toFixed(2) : "N/A"}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Spread Target</span>
                <span class="info-value">${spreadTarget}</span>
              </div>
            </div>

            <div class="card-metrics">
              <div class="metric">
                <div class="metric-label">Allocation Per Leg</div>
                <div class="metric-value">$${allocationPerLeg > 0 ? allocationPerLeg.toFixed(2) : "N/A"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Timeframe</div>
                <div class="metric-value">${timeframe}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Long Stop</div>
                <div class="metric-value">$${trade.long_stop || "N/A"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Short Stop</div>
                <div class="metric-value">$${trade.short_stop || "N/A"}</div>
              </div>
            </div>

            <div class="card-details" id="${cardId}">
              ${
                trade.rationale
                  ? `
              <div class="detail-section">
                <h4>Rationale</h4>
                <p>${trade.rationale}</p>
              </div>
              `
                  : ""
              }
            </div>
          </div>
        `;
      }

      function renderMacroEventCard(trade) {
        const cardId = `card-${Math.random().toString(36).substr(2, 9)}`;
        const eventName = trade.event_name || "Macro Event";
        const eventDate = trade.date || "N/A";
        const eventTime = trade.time || "";
        const instruments = trade.tradeable_instruments || [];
        const setup = trade.trade_setup || "N/A";
        const action = trade.recommended_action || "monitor";
        const rationale = trade.rationale || "";

        const impact = trade.impact || "medium";
        const impactClass =
          impact === "high" || impact === "very high"
            ? "confidence-high"
            : "confidence-medium";

        const confidence = trade.confidence || 50;
        const confidenceClass =
          confidence >= 75 ? "confidence-high" : "confidence-medium";

        return `
          <div class="trade-card">
            <div class="card-header" onclick="toggleCardExpansion('${cardId}')">
              <div>
                <div class="card-title">${eventName}</div>
                <div class="card-ticker">${eventDate} ${eventTime}</div>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <div class="confidence-badge ${confidenceClass}">${confidence}%</div>
                <span class="expand-icon" id="${cardId}-icon">▼</span>
              </div>
            </div>

            <div class="card-summary">
              <div class="info-row">
                <span class="info-label">Impact</span>
                <span class="info-value confidence-badge ${impactClass}">${impact.toUpperCase()}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Trade Setup</span>
                <span class="info-value">${setup}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Action</span>
                <span class="info-value">${action.replace(/_/g, " ")}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Instruments</span>
                <span class="info-value">${instruments.join(", ")}</span>
              </div>
            </div>

            <div class="card-details" id="${cardId}">
              ${
                rationale
                  ? `
              <div class="detail-section">
                <h4>Event Analysis</h4>
                <p>${rationale}</p>
              </div>
              `
                  : ""
              }
            </div>
          </div>
        `;
      }

      function renderTradeJournal(journal) {
        const container = document.getElementById("journal");
        const trades = journal.trades || journal.history || [];
        const capitalStart =
          journal.capital_start || journal.capitalStart || 1000;
        const capitalCurrent =
          journal.capital_current || journal.capitalCurrent || 1000;
        const totalPnL =
          journal.total_profit_loss || capitalCurrent - capitalStart;
        const winningTrades =
          journal.winning_trades ||
          trades.filter(
            (t) =>
              (t.outcome || t.result) === "WIN" ||
              (t.pnl_dollars || t.pnl || 0) > 0,
          ).length;
        const losingTrades =
          journal.losing_trades ||
          trades.filter(
            (t) =>
              (t.outcome || t.result) === "LOSS" ||
              (t.pnl_dollars || t.pnl || 0) < 0,
          ).length;
        const winRate =
          journal.win_rate ||
          (trades.length > 0
            ? ((winningTrades / trades.length) * 100).toFixed(1)
            : "0.0");
        const largestWin = journal.largest_win || null;
        const largestLoss = journal.largest_loss || null;

        const pnlColor =
          totalPnL >= 0 ? "var(--color-success)" : "var(--color-danger)";

        const header = `
          <div class="watchlist-header">
            <h2>📓 Trade Journal</h2>
            <div class="watchlist-meta">
              <span>💰 Starting: $${capitalStart.toFixed(2)}</span>
              <span>📈 Current: $${capitalCurrent.toFixed(2)}</span>
              <span style="color: ${pnlColor}; font-weight: 600;">Total P&L: $${totalPnL.toFixed(2)}</span>
              <span>📊 Trades: ${trades.length}</span>
              <span>✅ Wins: ${winningTrades}</span>
              <span>❌ Losses: ${losingTrades}</span>
              <span>📈 Win Rate: ${winRate}%</span>
              ${largestWin ? `<span style="color: var(--color-success);">💎 Best: $${largestWin.toFixed(2)}</span>` : ""}
              ${largestLoss ? `<span style="color: var(--color-danger);">💸 Worst: $${largestLoss.toFixed(2)}</span>` : ""}
            </div>
          </div>
        `;

        const cards = trades
          .map((trade) => {
            const ticker = trade.ticker || trade.symbol || "N/A";
            const entryDate =
              trade.date_open ||
              trade.entry_date ||
              trade.entryDate ||
              trade.date ||
              "N/A";
            const closeDate =
              trade.date_close || trade.exit_date || trade.exitDate || "Open";
            const strategy = trade.strategy || "N/A";
            const direction = trade.direction || "N/A";
            const entryPrice =
              trade.entry_price || trade.entryPrice || trade.entry || 0;
            const exitPrice =
              trade.exit_price || trade.exitPrice || trade.exit || 0;
            const pnlDollars =
              trade.pnl_dollars ||
              trade.pnlDollars ||
              trade.pnl ||
              trade.actual_profit_loss ||
              0;
            const pnlPercent =
              trade.pnl_percent || trade.pnlPercent || trade.pnl_pct || 0;
            const rMultiple = trade.r_multiple || trade.rMultiple || null;
            const holdingDays = trade.holding_days || trade.holdingDays || null;
            const outcome =
              trade.outcome ||
              trade.result ||
              (pnlDollars >= 0 ? "WIN" : "LOSS");
            const notes = trade.notes || "";
            const leverage = trade.leverage || null;
            const rulesFollowed =
              trade.rules_followed !== undefined ? trade.rules_followed : null;

            return `
              <div class="trade-card">
                <div class="card-header">
                  <div>
                    <div class="card-title">${ticker}</div>
                    <div class="card-ticker">${entryDate}${closeDate !== "Open" ? ` → ${closeDate}` : ""}</div>
                  </div>
                  <div class="confidence-badge ${outcome === "WIN" ? "confidence-high" : "confidence-medium"}">
                    ${outcome.toUpperCase()}
                  </div>
                </div>
                <div class="card-summary">
                  <div class="info-row">
                    <span class="info-label">Strategy</span>
                    <span class="info-value">${strategy}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Direction</span>
                    <span class="info-value">${direction}</span>
                  </div>
                  ${
                    leverage
                      ? `
                  <div class="info-row">
                    <span class="info-label">Leverage</span>
                    <span class="info-value">${leverage}x</span>
                  </div>
                  `
                      : ""
                  }
                  <div class="info-row">
                    <span class="info-label">Entry</span>
                    <span class="info-value">$${entryPrice > 0 ? entryPrice.toFixed(2) : "N/A"}</span>
                  </div>
                  ${
                    exitPrice > 0
                      ? `
                  <div class="info-row">
                    <span class="info-label">Exit</span>
                    <span class="info-value">$${exitPrice.toFixed(2)}</span>
                  </div>
                  `
                      : ""
                  }
                  <div class="info-row">
                    <span class="info-label">P&L</span>
                    <span class="info-value" style="color: ${pnlDollars >= 0 ? "var(--color-success)" : "var(--color-danger)"}">
                      $${pnlDollars.toFixed(2)} ${pnlPercent ? `(${pnlPercent.toFixed(2)}%)` : ""}
                    </span>
                  </div>
                  ${
                    rMultiple !== null
                      ? `
                  <div class="info-row">
                    <span class="info-label">R-Multiple</span>
                    <span class="info-value">${rMultiple.toFixed(2)}R</span>
                  </div>
                  `
                      : ""
                  }
                  ${
                    holdingDays !== null
                      ? `
                  <div class="info-row">
                    <span class="info-label">Holding Period</span>
                    <span class="info-value">${holdingDays} days</span>
                  </div>
                  `
                      : ""
                  }
                  ${
                    rulesFollowed !== null
                      ? `
                  <div class="info-row">
                    <span class="info-label">Rules Followed</span>
                    <span class="info-value">${rulesFollowed === true ? "✅ Yes" : rulesFollowed === false ? "❌ No" : rulesFollowed}</span>
                  </div>
                  `
                      : ""
                  }
                </div>
                ${
                  notes
                    ? `
                <p style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--color-border); font-size: 0.875rem; color: var(--color-text-secondary);">
                  ${notes}
                </p>
                `
                    : ""
                }
              </div>
            `;
          })
          .join("");

        container.innerHTML = header + `<div class="cards-grid">${cards}</div>`;
      }

      function switchTab(tabName) {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.remove("active");
        });
        event.target.classList.add("active");

        document.querySelectorAll(".tab-content").forEach((content) => {
          content.classList.remove("active");
        });
        document.getElementById(tabName).classList.add("active");
      }

      function showError(message) {
        const errorHtml = `<div class="error-message">${message}</div>`;
        document.querySelectorAll(".tab-content").forEach((content) => {
          content.innerHTML = errorHtml;
        });

        const statusIndicator = document.getElementById("dataStatus");
        const statusText = document.getElementById("dataStatusText");
        statusIndicator.className = "status-indicator status-error";
        statusText.textContent = "Error loading data";
      }

      function refreshData() {
        const button = event.target;
        button.disabled = true;
        button.textContent = "⏳ Loading...";

        loadAllData().finally(() => {
          button.disabled = false;
          button.textContent = "🔄 Refresh";
        });
      }

      function toggleAutoRefresh() {
        const isEnabled = document.getElementById("autoRefreshToggle").checked;

        if (isEnabled) {
          autoRefreshTimer = setInterval(() => {
            loadAllData();
          }, CONFIG.autoRefreshInterval);
        } else {
          if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
          }
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        loadAllData();
      });
    </script>
  </body>
</html>
