name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: app
        run: npm install
      - name: Type-check
        working-directory: app
        run: npx tsc --noEmit
      - name: Set build version (yyyyMMdd.HHmm UTC)
        id: version
        run: echo "BUILD_VERSION=$(date -u +"%Y%m%d.%H%M")" >> $GITHUB_ENV
      - name: Build
        working-directory: app
        env:
          VITE_APP_VERSION: ${{ env.BUILD_VERSION }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build
      - name: Copy index.html to 404.html for SPA deep-link support
        working-directory: app
        run: cp dist/index.html dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
