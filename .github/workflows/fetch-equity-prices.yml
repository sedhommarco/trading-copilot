name: Fetch Equity Prices

# Runs daily at 22:30 UTC (after US market close) and on manual trigger
on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch equity prices via Yahoo Finance
        run: node scripts/fetch-equity-prices.mjs

      - name: Commit updated price files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/public/prices/
          git diff --cached --quiet || (
            git commit -m "chore(prices): update equity price snapshots [skip ci]" &&
            git pull --rebase &&
            git push
          )
