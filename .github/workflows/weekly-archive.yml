name: Weekly Archive Snapshot

on:
  # Run every Sunday at 19:00 UTC (20:00 CET)
  schedule:
    - cron: '0 19 * * 0'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  create-archive:
    name: Create Weekly Archive Snapshot
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Calculate ISO week number
        id: week
        run: |
          # Calculate ISO 8601 week number
          YEAR=$(date +%Y)
          WEEK=$(date +%V)
          WEEK_START=$(date -d "$(date +%Y-W%V-1)" +%Y-%m-%d)
          WEEK_END=$(date -d "$(date +%Y-W%V-7)" +%Y-%m-%d)
          
          # Calculate previous week for comparison
          PREV_WEEK=$((WEEK - 1))
          PREV_YEAR=$YEAR
          if [ $PREV_WEEK -lt 1 ]; then
            PREV_WEEK=52
            PREV_YEAR=$((YEAR - 1))
          fi
          
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "week_start=$WEEK_START" >> $GITHUB_OUTPUT
          echo "week_end=$WEEK_END" >> $GITHUB_OUTPUT
          echo "prev_year=$PREV_YEAR" >> $GITHUB_OUTPUT
          echo "prev_week=$PREV_WEEK" >> $GITHUB_OUTPUT
          echo "📅 Archiving Week $WEEK ($WEEK_START to $WEEK_END)"

      - name: Create archive directory
        run: |
          ARCHIVE_DIR="archive/${{ steps.week.outputs.year }}/week-${{ steps.week.outputs.week }}"
          mkdir -p "$ARCHIVE_DIR/watchlists"
          mkdir -p "$ARCHIVE_DIR/context"
          mkdir -p "$ARCHIVE_DIR/journal"
          echo "✅ Created archive directory: $ARCHIVE_DIR"

      - name: Copy data files to archive
        run: |
          ARCHIVE_DIR="archive/${{ steps.week.outputs.year }}/week-${{ steps.week.outputs.week }}"
          
          # Copy manifest
          cp data/meta/manifest.json "$ARCHIVE_DIR/manifest.json"
          
          # Copy all watchlists
          cp data/watchlists/*.json "$ARCHIVE_DIR/watchlists/"
          
          # Copy market regime
          cp data/context/market-regime.json "$ARCHIVE_DIR/context/market-regime.json"
          
          # Copy journal files
          cp data/journal/transactions.json "$ARCHIVE_DIR/journal/transactions.json"
          cp data/journal/positions.json "$ARCHIVE_DIR/journal/positions.json"
          
          echo "✅ Copied all data files to archive"

      - name: Generate archive README
        run: |
          ARCHIVE_DIR="archive/${{ steps.week.outputs.year }}/week-${{ steps.week.outputs.week }}"
          
          # Extract summary data from copied files
          MARKET_REGIME=$(jq -r '.current_regime.regime' "$ARCHIVE_DIR/context/market-regime.json")
          VIX_LEVEL=$(jq -r '.current_regime.vix_level' "$ARCHIVE_DIR/context/market-regime.json")
          POSITIONS_COUNT=$(jq -r '.summary.total_open_positions' "$ARCHIVE_DIR/journal/positions.json")
          TRANSACTIONS_COUNT=$(jq -r '.summary.total_count' "$ARCHIVE_DIR/journal/transactions.json")
          
          # Count total opportunities across all watchlists
          TOTAL_OPP=0
          for file in "$ARCHIVE_DIR/watchlists/"*.json; do
            COUNT=$(jq '.opportunities | length' "$file")
            TOTAL_OPP=$((TOTAL_OPP + COUNT))
          done
          
          # Generate README
          cat > "$ARCHIVE_DIR/README.md" << EOF
          # Trading Copilot Archive - Week ${{ steps.week.outputs.week }}, ${{ steps.week.outputs.year }}
          
          **Week:** ${{ steps.week.outputs.week }} (${{ steps.week.outputs.week_start }} to ${{ steps.week.outputs.week_end }})  
          **Archived:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
          
          ---
          
          ## Market Summary
          
          - **Market Regime:** ${MARKET_REGIME}
          - **VIX Level:** ${VIX_LEVEL}
          - **Total Opportunities Tracked:** ${TOTAL_OPP}
          - **Open Positions:** ${POSITIONS_COUNT}
          - **Total Transactions:** ${TRANSACTIONS_COUNT}
          
          ---
          
          ## Archive Structure
          
          \`\`\`
          week-${{ steps.week.outputs.week }}/
          ├── README.md (this file)
          ├── manifest.json
          ├── watchlists/
          │   ├── pre-earnings.json
          │   ├── post-crash.json
          │   ├── volatility.json
          │   ├── crypto.json
          │   ├── pair-trades.json
          │   └── macro-events.json
          ├── context/
          │   └── market-regime.json
          ├── journal/
          │   ├── transactions.json
          │   └── positions.json
          ├── changes-from-previous-week.md (generated by analysis scripts)
          └── performance-analysis.md (generated by analysis scripts)
          \`\`\`
          
          ---
          
          ## Analysis Reports
          
          - **Week-over-Week Changes:** See \`changes-from-previous-week.md\`
          - **Performance Analysis:** See \`performance-analysis.md\`
          
          These reports are automatically generated by the archive analysis scripts.
          EOF
          
          echo "✅ Generated README for week ${{ steps.week.outputs.week }}"

      - name: Run archive comparison script (Phase 5)
        run: |
          CURR_DIR="archive/${{ steps.week.outputs.year }}/week-${{ steps.week.outputs.week }}"
          PREV_DIR="archive/${{ steps.week.outputs.prev_year }}/week-${{ steps.week.outputs.prev_week }}"
          
          if [ -d "$PREV_DIR" ]; then
            echo "📊 Comparing week ${{ steps.week.outputs.prev_week }} vs week ${{ steps.week.outputs.week }}..."
            node tools/archive-compare.js "$PREV_DIR" "$CURR_DIR" "$CURR_DIR/changes-from-previous-week.md"
            echo "✅ Generated week-over-week comparison"
          else
            echo "⚠️ Previous week archive not found, skipping comparison"
            echo "# Week-over-Week Changes" > "$CURR_DIR/changes-from-previous-week.md"
            echo "" >> "$CURR_DIR/changes-from-previous-week.md"
            echo "⚠️ This is the first archived week. No previous week to compare." >> "$CURR_DIR/changes-from-previous-week.md"
          fi

      - name: Run performance analysis script (Phase 6)
        run: |
          CURR_DIR="archive/${{ steps.week.outputs.year }}/week-${{ steps.week.outputs.week }}"
          
          echo "📈 Analyzing performance for week ${{ steps.week.outputs.week }}..."
          node tools/performance-analysis.js "$CURR_DIR" "$CURR_DIR/performance-analysis.md"
          echo "✅ Generated performance analysis report"

      - name: Update archive index
        run: |
          # Install jq if not available
          which jq || sudo apt-get update && sudo apt-get install -y jq
          
          ARCHIVE_DIR="archive/${{ steps.week.outputs.year }}/week-${{ steps.week.outputs.week }}"
          
          # Extract data for index entry
          MARKET_REGIME=$(jq -r '.current_regime.regime' "$ARCHIVE_DIR/context/market-regime.json")
          VIX_LEVEL=$(jq -r '.current_regime.vix_level' "$ARCHIVE_DIR/context/market-regime.json")
          POSITIONS_COUNT=$(jq -r '.summary.total_open_positions' "$ARCHIVE_DIR/journal/positions.json")
          TRANSACTIONS_COUNT=$(jq -r '.summary.total_count' "$ARCHIVE_DIR/journal/transactions.json")
          
          TOTAL_OPP=0
          for file in "$ARCHIVE_DIR/watchlists/"*.json; do
            COUNT=$(jq '.opportunities | length' "$file")
            TOTAL_OPP=$((TOTAL_OPP + COUNT))
          done
          
          # Create new index entry
          NEW_ENTRY=$(jq -n \
            --arg year "${{ steps.week.outputs.year }}" \
            --argjson week "${{ steps.week.outputs.week }}" \
            --arg week_start "${{ steps.week.outputs.week_start }}" \
            --arg week_end "${{ steps.week.outputs.week_end }}" \
            --arg created "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg path "$ARCHIVE_DIR" \
            --arg regime "$MARKET_REGIME" \
            --arg vix "$VIX_LEVEL" \
            --argjson opp "$TOTAL_OPP" \
            --argjson pos "$POSITIONS_COUNT" \
            --argjson txn "$TRANSACTIONS_COUNT" \
            '{
              year: ($year | tonumber),
              week_number: $week,
              week_start: $week_start,
              week_end: $week_end,
              created_at: $created,
              path: $path,
              snapshot_notes: "Automated weekly snapshot with analysis reports",
              total_opportunities_tracked: $opp,
              open_positions_count: $pos,
              total_transactions_count: $txn,
              market_regime: $regime,
              vix_level: $vix
            }')
          
          # Update archive/index.json
          if [ ! -f archive/index.json ]; then
            # Create new index if doesn't exist
            jq -n \
              --argjson entry "$NEW_ENTRY" \
              '{
                file_type: "archive_index",
                last_updated: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
                total_weeks_archived: 1,
                week_numbering: "ISO 8601",
                archives: [$entry]
              }' > archive/index.json
          else
            # Append to existing index
            jq \
              --argjson entry "$NEW_ENTRY" \
              '.last_updated = (now | strftime("%Y-%m-%dT%H:%M:%SZ")) | 
               .total_weeks_archived = (.archives | length) + 1 | 
               .archives += [$entry]' \
              archive/index.json > archive/index.json.tmp
            mv archive/index.json.tmp archive/index.json
          fi
          
          echo "✅ Updated archive/index.json"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            archive: add week-${{ steps.week.outputs.week }} snapshot (${{ steps.week.outputs.week_start }} to ${{ steps.week.outputs.week_end }})
            
            Market regime: ${{ steps.week.outputs.market_regime }}
            Positions: ${{ steps.week.outputs.positions_count }}
            Transactions: ${{ steps.week.outputs.transactions_count }}
            Opportunities: ${{ steps.week.outputs.total_opp }}
            
            Automated weekly archival with analysis reports (Phases 5 & 6).
          branch: archive/week-${{ steps.week.outputs.week }}-${{ steps.week.outputs.year }}
          delete-branch: true
          title: '📦 Archive Week ${{ steps.week.outputs.week }}, ${{ steps.week.outputs.year }} (${{ steps.week.outputs.week_start }} to ${{ steps.week.outputs.week_end }})'
          body: |
            ## 📦 Automated Weekly Archive
            
            **Week:** ${{ steps.week.outputs.week }} (${{ steps.week.outputs.week_start }} to ${{ steps.week.outputs.week_end }})  
            **Year:** ${{ steps.week.outputs.year }}  
            **Created:** $(date -u +"%Y-%m-%d %H:%M UTC")
            
            ---
            
            ### 📊 Snapshot Summary
            
            This PR contains the automated weekly archive snapshot with analysis reports.
            
            **Files archived:**
            - ✅ Manifest (`data/meta/manifest.json`)
            - ✅ All watchlists (`data/watchlists/*.json`)
            - ✅ Market regime (`data/context/market-regime.json`)
            - ✅ Journal (transactions + positions)
            - ✅ Archive README generated
            - ✅ `archive/index.json` updated
            - ✅ **Week-over-week comparison** (`changes-from-previous-week.md`)
            - ✅ **Performance analysis** (`performance-analysis.md`)
            
            ---
            
            ### 📈 Analysis Reports (Phases 5 & 6)
            
            This archive includes automated analysis reports:
            
            1. **`changes-from-previous-week.md`** (Phase 5)
               - Strategy-by-strategy opportunity changes
               - Symbol carry-over tracking (repeated, removed, added)
               - Market regime transitions
               - Trading activity deltas
            
            2. **`performance-analysis.md`** (Phase 6)
               - Strategy hit rates (predictions vs actuals)
               - Confidence calibration analysis
               - Market regime correlation
               - Journal P&L summary
            
            ---
            
            ### ✅ Ready to Merge
            
            This archive was created automatically by the Weekly Archive workflow.
            
            Review the snapshot and analysis reports, then merge when ready. After merging, this data will be permanently stored in the archive for historical analysis.
          labels: |
            archive
            automated
